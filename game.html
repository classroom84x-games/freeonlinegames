<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title id="title">Play Free Game Online</title>

  <meta name="description" content="Play free online browser games instantly. No downloads required.">
  <meta name="robots" content="index, follow">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f1117;
      color: white;
    }

    header {
      padding: 15px;
      background: #151826;
      text-align: center;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 10px;
    }

    .tags span {
      background: #2a2f45;
      padding: 5px 10px;
      margin: 5px;
      display: inline-block;
      border-radius: 6px;
      font-size: 12px;
    }

    .section {
      margin-top: 20px;
      line-height: 1.6;
      opacity: 0.9;
    }

    a {
      color: #4da3ff;
    }
  </style>
</head>

<body>

<header>🎮 GameOrbit</header>

<div class="container">

  <h1 id="gameTitle"></h1>

  <iframe id="gameFrame"></iframe>

  <div class="section" id="description"></div>

  <div class="tags" id="tags"></div>

  <div class="section">
    <h3>🔥 More Games Like This</h3>
    <div id="similar"></div>
  </div>

</div>

<script>
const API_URL = "https://classroom84x.xyz/pull.json";

function slugify(text) {
  return text.toLowerCase().replace(/\s+/g, "-");
}

function getSlug() {
  const path = window.location.pathname;
  return path.split("/").pop().replace(".html", "");
}

async function loadGame() {
  const res = await fetch(API_URL);
  const games = await res.json();

  const slug = getSlug();

  const game = games.find(g =>
    slugify(g.title) === slug
  );

  if (!game) {
    document.body.innerHTML = "<h2 style='padding:20px'>Game not found</h2>";
    return;
  }

  document.title = game.title + " - GameOrbit";

  document.getElementById("gameTitle").innerText = game.title;

  document.getElementById("gameFrame").src = game.url;

  document.getElementById("description").innerHTML = `
    <p><b>${game.title}</b> is a free browser game you can play instantly.</p>
    <p>No downloads required. Play directly in your browser with smooth performance.</p>
  `;

  const tags = game.tags || ["free game", "online game", "browser game"];

  document.getElementById("tags").innerHTML =
    tags.map(t => `<span>${t}</span>`).join("");

  const similar = games
    .filter(g => g.title !== game.title)
    .slice(0, 6);

  document.getElementById("similar").innerHTML =
    similar.map(g => `
      <a href="/game/${slugify(g.title)}.html">
        ▶ ${g.title}
      </a><br/>
    `).join("");
}

loadGame();
</script>

</body>
</html>
