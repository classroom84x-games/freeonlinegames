<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Game Online free | Play now free online on your browser</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f1117;
      color: white;
    }

    header {
      padding: 15px;
      background: #151826;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 10px;
    }

    .meta {
      margin-top: 15px;
      opacity: 0.8;
      font-size: 14px;
      line-height: 1.5;
    }

    .tags {
      margin-top: 10px;
    }

    .tag {
      display: inline-block;
      background: #2a2f45;
      padding: 5px 10px;
      margin: 5px;
      border-radius: 6px;
      font-size: 12px;
    }

    a {
      color: #4da3ff;
    }
  </style>
</head>

<body>

<header>🎮 GameOrbit</header>

<div class="container">

  <h1 id="title">Loading...</h1>

  <iframe id="gameFrame"></iframe>

  <div class="meta" id="description"></div>

  <div class="tags" id="tags"></div>

</div>

<script>
const API_URL = "https://classroom84x.xyz/pull.json";

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

const id = getParam("id");

async function loadGame() {
  const res = await fetch(API_URL);
  const games = await res.json();

  const game = games.find(g =>
    (g.slug || g.id || g.title)
      .toLowerCase()
      .replace(/\s+/g, "-") === id
  );

  if (!game) {
    document.body.innerHTML = "<h2 style='padding:20px'>Game not found</h2>";
    return;
  }

  const title = game.title;

  document.title = title + " - GameOrbit";

  document.getElementById("title").innerText = title;

  document.getElementById("gameFrame").src = game.url;

  document.getElementById("description").innerHTML = `
    Play <b>${title}</b> online for free. 
    Enjoy smooth gameplay directly in your browser with no downloads required.
    Explore similar games on GameOrbit.
  `;

  const tags = game.tags || ["online game", "free game", "browser game"];

  document.getElementById("tags").innerHTML =
    tags.map(t => `<span class="tag">${t}</span>`).join("");
}

loadGame();
</script>

</body>
</html>
